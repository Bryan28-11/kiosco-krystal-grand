<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Krystal Grand Nuevo Vallarta · Kiosco</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-eyebrow">Bienvenido a</span>
      <h1 class="brand-name">Krystal Grand <em>Nuevo Vallarta</em></h1>
    </div>
    <div class="clock" id="clock">--:--</div>
  </header>

  <main class="menu-grid">

    <button class="card card--habitaciones" data-target="habitaciones">
      <span class="card-icon">🛏️</span>
      <span class="card-title">Habitaciones</span>
      <span class="card-sub">Suites, vistas y servicios</span>
    </button>

    <button class="card card--restaurantes" data-target="restaurantes">
      <span class="card-icon">🍽️</span>
      <span class="card-title">Restaurantes</span>
      <span class="card-sub">Sabores y horarios</span>
    </button>

    <button class="card card--mapa" data-target="mapa">
      <span class="card-icon">🗺️</span>
      <span class="card-title">Mapa del Hotel</span>
      <span class="card-sub">Encuentra cada rincón</span>
    </button>

    <button class="card card--actividades" data-target="actividades">
      <span class="card-icon">🌴</span>
      <span class="card-title">Actividades</span>
      <span class="card-sub">Diversión para todos</span>
    </button>

  </main>

  <footer class="footbar">
    <span>Toca una opción para comenzar</span>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
